version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: personal-finance-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personalfinance

    ports:
      - "5432:5432"

    volumes:
      - personal-finance-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d personalfinance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  personal-finance-postgres-data: